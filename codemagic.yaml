# Codemagic CI/CD — Opiflow native builds (Capacitor wrapper).
#
# Why this exists: the local dev box has no Mac, so iOS is built on Codemagic's
# cloud-Mac. Android can build here too (no Android Studio needed locally).
#
# The Capacitor shell loads the LIVE web app (https://opiflow.vercel.app), so
# these workflows do NOT build the Next.js app — they only wrap it. The web app
# is shipped separately via Vercel.
#
# Setup on codemagic.io (one-time):
#   1. Connect the GitHub repo (gsane3/opiflow).
#   2. iOS: enable automatic code signing (App Store Connect API key) + create
#      the bundle id `ai.opiflow.app`. Add the APNs key in Firebase for push.
#   3. Android: upload the keystore to Codemagic and reference it (see below).
#   4. Put google-services.json (Android) / GoogleService-Info.plist (iOS) in
#      Codemagic "Environment variables" as base64, or commit them, before push.
#
# Docs: docs/NATIVE_WRAPPER.md

workflows:
  # -------------------------------------------------------------------------
  # Android DEBUG — installable test .apk, NO signing/keystore needed.
  # Start here: this is the fastest "see it on my phone" build. Codemagic emails
  # the .apk download link when it finishes. google-services.json is committed,
  # so FCM push works in the build.
  # -------------------------------------------------------------------------
  android-debug:
    name: Opiflow Android (debug APK — test)
    # mac_mini_m2 = the instance the Codemagic free plan includes (500 min/mo).
    # macOS builds Android fine (JDK + Android SDK preinstalled).
    instance_type: mac_mini_m2
    max_build_duration: 45
    environment:
      node: 20
    scripts:
      - name: Install JS deps
        script: npm ci --ignore-scripts # skip sharp/@capacitor/assets native download (not needed to build; flaky 502s)
      - name: Capacitor sync (Android)
        script: npx cap sync android
      - name: Build debug APK
        script: |
          # Capacitor 7 compiles its Android modules at Java 21. Find JDK 21 on
          # the machine; if it isn't installed, install it via Homebrew.
          echo "== Installed JDKs =="; /usr/libexec/java_home -V 2>&1 || true
          JDK21="$(/usr/libexec/java_home -v 21 2>/dev/null || true)"
          if [ -z "$JDK21" ]; then
            echo "== JDK 21 not found — installing via Homebrew =="
            brew install openjdk@21
            JDK21="$(brew --prefix openjdk@21)/libexec/openjdk.jdk/Contents/Home"
          fi
          export JAVA_HOME="$JDK21"
          echo "== Using JAVA_HOME=$JAVA_HOME =="; "$JAVA_HOME/bin/java" -version
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.java.home="$JAVA_HOME"
    artifacts:
      - android/app/build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - georgiostsipos@gmail.com

  # -------------------------------------------------------------------------
  # Android — builds a signed .aab for Google Play
  # -------------------------------------------------------------------------
  android-release:
    name: Opiflow Android (release .aab)
    instance_type: linux_x2
    max_build_duration: 60
    environment:
      node: 20
      groups:
        - opiflow_android # define KEYSTORE_PATH, CM_KEYSTORE_PASSWORD, etc. in this group
    scripts:
      - name: Install JS deps
        script: npm ci --ignore-scripts # skip sharp/@capacitor/assets native download (not needed to build; flaky 502s)
      - name: Restore google-services.json
        script: |
          # Optional: if you stored it as a base64 env var GOOGLE_SERVICES_JSON
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json
          fi
      - name: Capacitor sync (Android)
        script: npx cap sync android
      - name: Build release bundle
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk
    publishing:
      # Add an App Store Connect / Google Play integration in Codemagic to
      # auto-upload to the internal testing track.
      email:
        recipients:
          - georgiostsipos@gmail.com

  # -------------------------------------------------------------------------
  # iOS — builds a signed .ipa for TestFlight / App Store
  # -------------------------------------------------------------------------
  ios-release:
    name: Opiflow iOS (release .ipa)
    instance_type: mac_mini_m2
    max_build_duration: 90
    integrations:
      app_store_connect: opiflow_asc # App Store Connect API key added in Codemagic
    environment:
      node: 20
      xcode: latest
      cocoapods: default
      groups:
        - opiflow_ios # define GOOGLE_SERVICE_INFO_PLIST (base64 of GoogleService-Info.plist) in this Codemagic group
      vars:
        BUNDLE_ID: ai.opiflow.app
    # No `ios_signing:` block: we sign manually in "Set up signing" below with
    # `--create` (Codemagic creates the distribution certificate + App Store
    # profile via the opiflow_asc ASC key) and apply it to the App target only.
    scripts:
      - name: Install JS deps
        script: npm ci --ignore-scripts # skip sharp/@capacitor/assets native download (not needed to build; flaky 502s)
      - name: Add iOS platform (idempotent)
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
      - name: Restore GoogleService-Info.plist
        script: |
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > ios/App/App/GoogleService-Info.plist
            echo "Wrote ios/App/App/GoogleService-Info.plist"
          else
            echo "WARNING: GOOGLE_SERVICE_INFO_PLIST not set — iOS push will NOT work"
          fi
      - name: iOS Firebase native wiring
        # cap add ios regenerates a bare AppDelegate + does not reference the plist,
        # so wire both up here (idempotent). @capacitor-firebase/messaging needs the
        # 3 APNs-forwarding methods; the plist must be in the bundle for Firebase.
        script: |
          python3 scripts/ci/ios-appdelegate-patch.py ios/App/App/AppDelegate.swift
          gem install xcodeproj --no-document
          ruby scripts/ci/ios-register-plist.rb
      - name: Capacitor sync (iOS)
        script: npx cap sync ios
      - name: Export compliance (skip encryption prompt)
        # The app uses only standard HTTPS/TLS (exempt). Set the flag so App Store
        # Connect stops asking "Missing Compliance" on every upload. Delete-then-Add
        # keeps it idempotent across the freshly generated Info.plist.
        script: |
          /usr/libexec/PlistBuddy -c "Delete :ITSAppUsesNonExemptEncryption" ios/App/App/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" ios/App/App/Info.plist
      - name: CocoaPods install
        # Materialize App.xcworkspace/Pods before signing so use-profiles patches
        # the real App project. Mirrors Codemagic's official Capacitor recipe.
        script: cd ios/App && pod install
      - name: Set up signing
        # Manual signing: create (if missing) + fetch the App Store profile and a
        # distribution certificate via the opiflow_asc ASC API key, then apply them
        # to the App target ONLY (--project) — otherwise use-profiles also walks
        # Pods.xcodeproj and SILENTLY leaves the App target on Automatic signing,
        # which makes `xcodebuild archive` fail with "App requires a provisioning
        # profile". --warn-only surfaces a no-match in the log instead of hiding it.
        script: |
          keychain initialize
          # Persistent signing-cert private key, passed as BASE64
          # (CERTIFICATE_PRIVATE_KEY_B64 in the opiflow_ios group) and decoded to a
          # file. A raw multi-line PEM in a Codemagic env var gets its newlines
          # flattened and is rejected ("--certificate-key ... is not valid"); base64
          # is single-line and round-trips the exact bytes. The persistent key makes
          # the distribution certificate reproducible across ephemeral build VMs
          # (otherwise --create makes a throwaway cert whose private key is lost).
          echo "$CERTIFICATE_PRIVATE_KEY_B64" | base64 --decode > /tmp/cert_key.pem
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @file:/tmp/cert_key.pem \
            --create
          keychain add-certificates
          xcode-project use-profiles \
            --project "ios/App/App.xcodeproj" \
            --warn-only
      - name: Build .ipa
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Distribute to the INTERNAL TestFlight group only. Internal testing needs
        # no App Review (avoids Guideline 4.2 for the web-wrapper) and no Beta App
        # Review / test-info. Without this, submit_to_testflight tries EXTERNAL beta
        # review and fails ("Complete test information is required ... external testing").
        beta_groups:
          - opiflow
      email:
        recipients:
          - georgiostsipos@gmail.com
